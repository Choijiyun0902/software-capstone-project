<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>AI 냉장고 매니저</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; cursor: pointer; background-color: #4CAF50; color: white; border: none; }
        #result { margin-top: 30px; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <h1>🍎 AI 냉장고 레시피 추천</h1>
    <p>냉장고에 있는 재료를 쉼표(,)로 구분해서 입력하세요.</p>
    <input type="text" id="items" placeholder="예: 계란, 양파, 스팸">
    <button onclick="getRecipe()">레시피 물어보기</button>
    <div id="result"></div>

    <script>
        async function getRecipe() {
            const items = document.getElementById('items').value;
            const resultDiv = document.getElementById('result');
            resultDiv.innerText = "AI 요리사가 고민 중입니다...";

            // 우리가 만든 ApiController의 /api/recommend 주소로 요청을 보내요!
            const response = await fetch(`/api/recommend?items=${items}`);
            const data = await response.text();
            resultDiv.innerText = data;
        }
    </script>
</body>
</html>
